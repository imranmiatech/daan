<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Live Class Message Test</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        --bg: #f6f7fb;
        --panel: #ffffff;
        --line: #d9deea;
        --text: #172033;
        --muted: #647086;
        --accent: #1f7a5b;
        --accent-dark: #155a43;
        --danger: #b42318;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
      }

      main {
        display: grid;
        grid-template-columns: 360px minmax(0, 1fr);
        min-height: 100vh;
      }

      aside {
        border-right: 1px solid var(--line);
        background: var(--panel);
        padding: 20px;
        overflow: auto;
      }

      section {
        display: grid;
        grid-template-rows: auto 1fr auto;
        min-width: 0;
        min-height: 100vh;
      }

      h1 {
        margin: 0 0 18px;
        font-size: 22px;
        line-height: 1.2;
      }

      h2 {
        margin: 0;
        font-size: 18px;
      }

      label {
        display: block;
        margin: 14px 0 6px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 650;
      }

      input,
      textarea,
      select,
      button {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 6px;
        font: inherit;
      }

      input,
      textarea,
      select {
        min-height: 40px;
        padding: 10px 11px;
        background: #fff;
        color: var(--text);
      }

      textarea {
        min-height: 96px;
        resize: vertical;
      }

      button {
        min-height: 40px;
        padding: 9px 12px;
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
        cursor: pointer;
        font-weight: 700;
      }

      button:hover {
        background: var(--accent-dark);
      }

      button.secondary {
        background: #fff;
        color: var(--text);
        border-color: var(--line);
      }

      button.danger {
        background: var(--danger);
        border-color: var(--danger);
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 16px;
      }

      .status {
        margin-top: 14px;
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 6px;
        color: var(--muted);
        font-size: 13px;
        overflow-wrap: anywhere;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 18px 22px;
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }

      .room {
        color: var(--muted);
        font-size: 13px;
        overflow-wrap: anywhere;
      }

      .messages {
        overflow: auto;
        padding: 20px;
      }

      .message {
        max-width: 760px;
        margin-bottom: 12px;
        padding: 12px 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .message .meta {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 7px;
        color: var(--muted);
        font-size: 12px;
      }

      .message .content {
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }

      .resource {
        display: block;
        margin-top: 8px;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 6px;
        color: var(--accent-dark);
        text-decoration: none;
        background: #f8fbfa;
      }

      .composer {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 160px;
        gap: 12px;
        padding: 16px 20px;
        border-top: 1px solid var(--line);
        background: var(--panel);
      }

      .empty {
        color: var(--muted);
        text-align: center;
        padding: 40px 0;
      }

      @media (max-width: 820px) {
        main {
          grid-template-columns: 1fr;
        }

        aside,
        section {
          min-height: auto;
        }

        .composer {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <aside>
        <h1>Live Class Messages</h1>

        <label for="apiBase">API Base URL</label>
        <input id="apiBase" value="http://localhost:3000" />

        <label for="token">Bearer Token</label>
        <textarea id="token" placeholder="Paste access token"></textarea>

        <label for="roomType">Class Type</label>
        <select id="roomType">
          <option value="GROUP">Group class</option>
          <option value="PRIVATE">Private class</option>
        </select>

        <label for="courseId">Group Course ID</label>
        <input id="courseId" placeholder="course id" />

        <label for="lessonIndex">Group Lesson Index</label>
        <input id="lessonIndex" type="number" min="0" value="0" />

        <label for="paymentId">Private Payment ID</label>
        <input id="paymentId" placeholder="payment id" />

        <div class="actions">
          <button id="connectBtn">Connect</button>
          <button id="disconnectBtn" class="danger">Disconnect</button>
          <button id="joinBtn" class="secondary">Join Room</button>
          <button id="historyBtn" class="secondary">Load History</button>
        </div>

        <label for="resourceName">Resource Name</label>
        <input id="resourceName" placeholder="Lesson notes.pdf" />

        <label for="resourceUrl">Resource URL</label>
        <input id="resourceUrl" placeholder="https://..." />

        <div class="actions">
          <button id="shareResourceBtn" class="secondary">Share Resource</button>
          <button id="clearBtn" class="secondary">Clear UI</button>
        </div>

        <div id="status" class="status">Disconnected</div>
      </aside>

      <section>
        <div class="topbar">
          <div>
            <h2>Running Class Chat</h2>
            <div id="roomLabel" class="room">No room joined</div>
          </div>
        </div>

        <div id="messages" class="messages">
          <div class="empty">Join a live class room to see messages.</div>
        </div>

        <div class="composer">
          <textarea id="messageInput" placeholder="Type message"></textarea>
          <button id="sendBtn">Send</button>
        </div>
      </section>
    </main>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
      const els = {
        apiBase: document.querySelector("#apiBase"),
        token: document.querySelector("#token"),
        roomType: document.querySelector("#roomType"),
        courseId: document.querySelector("#courseId"),
        lessonIndex: document.querySelector("#lessonIndex"),
        paymentId: document.querySelector("#paymentId"),
        connectBtn: document.querySelector("#connectBtn"),
        disconnectBtn: document.querySelector("#disconnectBtn"),
        joinBtn: document.querySelector("#joinBtn"),
        historyBtn: document.querySelector("#historyBtn"),
        clearBtn: document.querySelector("#clearBtn"),
        shareResourceBtn: document.querySelector("#shareResourceBtn"),
        resourceName: document.querySelector("#resourceName"),
        resourceUrl: document.querySelector("#resourceUrl"),
        status: document.querySelector("#status"),
        roomLabel: document.querySelector("#roomLabel"),
        messages: document.querySelector("#messages"),
        messageInput: document.querySelector("#messageInput"),
        sendBtn: document.querySelector("#sendBtn"),
      };

      let socket = null;
      let currentRoomId = "";

      function token() {
        return els.token.value.trim().replace(/^Bearer\s+/i, "");
      }

      function apiBase() {
        return els.apiBase.value.trim().replace(/\/$/, "");
      }

      function setStatus(message) {
        els.status.textContent = message;
      }

      function roomPayload() {
        if (els.roomType.value === "GROUP") {
          return {
            roomType: "GROUP",
            courseId: els.courseId.value.trim(),
            curriculumIndex: Number(els.lessonIndex.value || 0),
          };
        }

        return {
          roomType: "PRIVATE",
          paymentId: els.paymentId.value.trim(),
        };
      }

      function historyUrl() {
        const payload = roomPayload();
        if (payload.roomType === "GROUP") {
          return `${apiBase()}/live-class-messages/group/${encodeURIComponent(
            payload.courseId,
          )}/lessons/${payload.curriculumIndex}/messages`;
        }

        return `${apiBase()}/live-class-messages/private/${encodeURIComponent(
          payload.paymentId,
        )}/messages`;
      }

      function resourceUrl() {
        const payload = roomPayload();
        if (payload.roomType === "GROUP") {
          return `${apiBase()}/live-class-messages/group/${encodeURIComponent(
            payload.courseId,
          )}/lessons/${payload.curriculumIndex}/resources`;
        }

        return `${apiBase()}/live-class-messages/private/${encodeURIComponent(
          payload.paymentId,
        )}/resources`;
      }

      function clearMessages() {
        els.messages.innerHTML = "";
      }

      function renderMessage(message) {
        const empty = els.messages.querySelector(".empty");
        if (empty) empty.remove();

        const sender = message.sender || {};
        const div = document.createElement("div");
        div.className = "message";

        const sentAt = message.createdAt
          ? new Date(message.createdAt).toLocaleString()
          : "";

        const resource =
          message.messageType === "RESOURCE" && message.resourceUrl
            ? `<a class="resource" href="${escapeAttr(
                message.resourceUrl,
              )}" target="_blank" rel="noreferrer">${escapeHtml(
                message.resourceName || message.resourceUrl,
              )}</a>`
            : "";

        div.innerHTML = `
          <div class="meta">
            <span>${escapeHtml(sender.fullName || sender.email || "User")}</span>
            <span>${escapeHtml(sentAt)}</span>
          </div>
          <div class="content">${escapeHtml(message.content || "")}</div>
          ${resource}
        `;

        els.messages.appendChild(div);
        els.messages.scrollTop = els.messages.scrollHeight;
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function escapeAttr(value) {
        return escapeHtml(value).replaceAll("`", "&#096;");
      }

      async function connect() {
        if (!token()) {
          setStatus("Token required");
          return;
        }

        if (socket) socket.disconnect();

        socket = io(`${apiBase()}/live-class`, {
          auth: { token: token() },
          transports: ["websocket", "polling"],
        });

        socket.on("connect", () => setStatus(`Socket connected: ${socket.id}`));
        socket.on("disconnect", () => setStatus("Socket disconnected"));
        socket.on("connect_error", (error) =>
          setStatus(`Socket error: ${error.message}`),
        );
        socket.on("live-class:new-message", renderMessage);
        socket.on("live-class:user-joined", (payload) =>
          setStatus(`User joined ${payload.roomId}`),
        );
        socket.on("live-class:user-left", (payload) =>
          setStatus(`User left ${payload.roomId}`),
        );
      }

      function joinRoom() {
        if (!socket?.connected) {
          setStatus("Connect socket first");
          return;
        }

        socket.emit("live-class:join", roomPayload(), (response) => {
          currentRoomId = response?.data?.roomId || "";
          els.roomLabel.textContent = currentRoomId || "Room joined";
          setStatus(JSON.stringify(response));
        });
      }

      async function loadHistory() {
        const response = await fetch(historyUrl(), {
          headers: {
            Authorization: `Bearer ${token()}`,
          },
        });
        const data = await response.json();

        if (!response.ok) {
          setStatus(JSON.stringify(data));
          return;
        }

        clearMessages();
        const messages = data?.data?.messages || [];
        if (!messages.length) {
          els.messages.innerHTML =
            '<div class="empty">No live class messages yet.</div>';
        }
        messages.forEach(renderMessage);
        els.roomLabel.textContent = data?.data?.roomId || currentRoomId;
        setStatus(`Loaded ${messages.length} messages`);
      }

      function sendMessage() {
        const content = els.messageInput.value.trim();
        if (!content) return;

        if (socket?.connected) {
          socket.emit(
            "live-class:message",
            { ...roomPayload(), content },
            (response) => setStatus(JSON.stringify(response)),
          );
        } else {
          setStatus("Socket is not connected");
        }

        els.messageInput.value = "";
      }

      async function shareResource() {
        const body = {
          resourceName: els.resourceName.value.trim(),
          resourceUrl: els.resourceUrl.value.trim(),
        };

        if (!body.resourceName || !body.resourceUrl) {
          setStatus("Resource name and URL required");
          return;
        }

        if (socket?.connected) {
          socket.emit(
            "live-class:resource",
            { ...roomPayload(), ...body },
            (response) => setStatus(JSON.stringify(response)),
          );
          return;
        }

        const response = await fetch(resourceUrl(), {
          method: "POST",
          headers: {
            Authorization: `Bearer ${token()}`,
            "Content-Type": "application/json",
          },
          body: JSON.stringify(body),
        });
        const data = await response.json();
        setStatus(JSON.stringify(data));
        if (response.ok) renderMessage(data.data);
      }

      els.connectBtn.addEventListener("click", connect);
      els.disconnectBtn.addEventListener("click", () => socket?.disconnect());
      els.joinBtn.addEventListener("click", joinRoom);
      els.historyBtn.addEventListener("click", loadHistory);
      els.clearBtn.addEventListener("click", () => {
        clearMessages();
        els.messages.innerHTML =
          '<div class="empty">Messages cleared locally.</div>';
      });
      els.sendBtn.addEventListener("click", sendMessage);
      els.shareResourceBtn.addEventListener("click", shareResource);
      els.messageInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          sendMessage();
        }
      });
    </script>
  </body>
</html>
