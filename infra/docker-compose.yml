services:
  # --- PostgreSQL Database ---
  postgres:
    image: postgres:18.4-alpine
    container_name: postgres
    restart: unless-stopped
    shm_size: 256mb # Adjust based on RAM allocations
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-daanclerk_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_postgres_password_123}
      POSTGRES_DB: ${POSTGRES_DB:-daanclerk_db}
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - proxy-net
    # Postgres configuration performance overrides
    command: >
      postgres  -c max_connections=100 -c shared_buffers=256MB -c effective_cache_size=768MB -c maintenance_work_mem=64MB -c checkpoint_completion_target=0.9 -c wal_buffers=7864kB -c default_statistics_target=100 -c random_page_cost=1.1 -c effective_io_concurrency=200 -c work_mem=4MB -c min_wal_size=1GB -c max_wal_size=4GB
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1536M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Redis Cache ---
  redis:
    image: redis:7.2.4-alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-secure_redis_password_123} --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - proxy-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-secure_redis_password_123}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

